name: Instagram Reels Bot

permissions: write-all

on:
  schedule:
    - cron: '0 5,10,15 * * *'
  workflow_dispatch:

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repozitoriyani olish
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Python ornatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Kutubxonalarni ornatish
        run: |
          python -m pip install --upgrade pip
          pip install Pillow==10.4.0 moviepy==1.0.3 numpy==1.26.4 edge-tts==6.1.3 requests==2.32.3 imageio==2.34.0 imageio-ffmpeg==0.5.1
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          python -c "import PIL; print('OK')"
          echo "Barchasi ornatildi"
      
      - name: Video yaratish
        run: |
          echo "=== VIDEO YARATISH ==="
          python generate_video.py
          if [ ! -f output/video.mp4 ]; then echo "XATO"; exit 1; fi
          echo "Video tayyor"
      
      - name: Media branchga joylash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "MotivBot"
          git config --global user.email "motivbot@users.noreply.github.com"
          git fetch origin
          git checkout --orphan media
          git rm -rf . 2>/dev/null || true
          cp output/video.mp4 video.mp4 2>/dev/null || true
          cp output/caption.txt caption.txt 2>/dev/null || true
          git add video.mp4 caption.txt 2>/dev/null || true
          git commit -m "Video $(date)" 2>/dev/null || true
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin media --force
          echo "Yuklandi"
      
      - name: Asosiy branchga qaytish
        run: git checkout main
      
      - name: Instagramga joylash
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        run: |
          echo "=== INSTAGRAMGA JOYLASH ==="
          pip install instagrapi==2.1.1
          python upload_and_post.py
      
      - name: Yakunlash
        if: always()
        run: echo "Workflow yakunlandi"
