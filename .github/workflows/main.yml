name: Instagram Reels Bot

permissions: write-all

on:
  schedule:
    - cron: '0 5,10,15 * * *'
  workflow_dispatch:

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repozitoriyani olish
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install Pillow==10.4.0 moviepy==1.0.3 numpy==1.26.4 edge-tts==6.1.3 requests==2.32.3 imageio==2.34.0 imageio-ffmpeg==0.5.1
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          
          # Tekshirish - alohida satrlarda
          python -c "import PIL; print('Pillow:', PIL.__version__)"
          python -c "import moviepy; print('moviepy:', moviepy.__version__)"
          python -c "import numpy; print('numpy:', numpy.__version__)"
          python -c "import edge_tts; print('edge-tts: OK')"
          echo "✅ Barcha kutubxonalar o'rnatildi!"
      
      - name: 🎬 Video yaratish
        run: |
          echo "=== VIDEO YARATISH ==="
          python generate_video.py
          
          echo "=== NATIJA ==="
          ls -la output/
          
          if [ ! -f output/video.mp4 ]; then
            echo "❌ Video yaratilmadi!"
            exit 1
          fi
          echo "✅ Video yaratildi!"
      
      - name: 📤 Media branch'ga joylash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== MEDIA BRANCH'GA JOYLASH ==="
          
          git config --global user.name "MotivBot"
          git config --global user.email "motivbot@users.noreply.github.com"
          
          git fetch origin
          git checkout --orphan media 2>/dev/null || git checkout -b media
          
          git rm -rf . 2>/dev/null || true
          
          cp output/video.mp4 video.mp4
          cp output/caption.txt caption.txt 2>/dev/null || true
          
          git add video.mp4 caption.txt 2>/dev/null || true
          
          git commit -m "Video: $(date '+%Y-%m-%d %H:%M')" 2>/dev/null || echo "Hech narsa o'zgarmadi"
          
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin media --force
          
          echo "✅ Media branch'ga yuklandi!"
      
      - name: 🔙 Asosiy branch'ga qaytish
        run: |
          git checkout main
          echo "✅ Asosiy branch'ga qaytildi"
      
      - name: 📸 Instagram'ga joylash
        run: |
          echo "=== INSTAGRAMGA JOYLASH ==="
          python upload_and_post.py
      
      - name: ✅ Yakunlash
        if: always()
        run: |
          echo "=== NATIJA ==="
          echo "✅ Workflow yakunlandi!"
