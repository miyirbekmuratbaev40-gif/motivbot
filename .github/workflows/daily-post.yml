name: Instagram Reels Bot

on:
  schedule:
    - cron: '0 5,10,15 * * *'
  workflow_dispatch:

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repozitoriyani olish
        uses: actions/checkout@v4
      
      - name: 🐍 Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          
          # MUHIM: requirements.txt dan o'rnatish
          pip install -r requirements.txt
          
          # Agar requirements.txt bo'lmasa, qo'lda o'rnatish
          pip install Pillow==10.4.0 moviepy==1.0.3 numpy==1.26.4 edge-tts==6.1.3 requests==2.32.3 imageio==2.34.0 imageio-ffmpeg==0.5.1
          
          # ffmpeg ni ham o'rnatish
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          
          # Tekshirish
          python -c "import PIL; print(f'Pillow: {PIL.__version__}')"
          python -c "import moviepy; print(f'moviepy: {moviepy.__version__}')"
          python -c "import numpy; print(f'numpy: {numpy.__version__}')"
          python -c "import edge_tts; print('edge-tts: OK')"
          echo "✅ Barcha kutubxonalar o'rnatildi!"
      
      - name: 🎬 Video yaratish
        run: |
          echo "=== VIDEO YARATISH ==="
          python generate_video.py
          
          # Tekshirish
          if [ -f output/video.mp4 ]; then
            echo "✅ Video yaratildi!"
            ls -la output/
          else
            echo "❌ Video yaratilmadi!"
            exit 1
          fi
      
      - name: 📤 Videoni media branch'ga joylash
        run: |
          echo "=== MEDIA BRANCH'GA JOYLASH ==="
          
          git config --global user.name "MotivBot"
          git config --global user.email "motivbot@github.com"
          
          git fetch origin
          git checkout -b media origin/media 2>/dev/null || git checkout --orphan media
          
          if [ -f output/video.mp4 ]; then
            cp output/video.mp4 video.mp4
            cp output/caption.txt caption.txt 2>/dev/null || true
            
            git add video.mp4 caption.txt 2>/dev/null || true
            git commit -m "🎬 Video: $(date '+%Y-%m-%d %H:%M')" 2>/dev/null || true
            git push origin media --force
            echo "✅ Media branch'ga yuklandi!"
          else
            echo "❌ Video topilmadi!"
            exit 1
          fi
      
      - name: 🔙 Asosiy branch'ga qaytish
        run: |
          git checkout main
          git branch -D media 2>/dev/null || true
      
      - name: 📸 Instagram'ga joylash
        run: |
          echo "=== INSTAGRAMGA JOYLASH ==="
          python upload_and_post.py
      
      - name: ✅ Yakunlash
        if: always()
        run: |
          echo "=== NATIJA ==="
          echo "✅ Workflow yakunlandi!"
