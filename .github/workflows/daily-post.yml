name: Instagram Reels Bot

on:
  schedule:
    # Har kuni soat 10:00, 15:00, 20:00 da (Toshkent vaqti)
    - cron: '0 5,10,15 * * *'
  workflow_dispatch:  # Qo'lda ishga tushirish

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repozitoriyani olish
        uses: actions/checkout@v4
      
      - name: 🐍 Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install pillow moviepy numpy edge-tts requests
          
          # Agar fonts papkasida shriftlar bo'lsa
          mkdir -p fonts output
      
      - name: 🎬 Video yaratish
        run: |
          echo "=== VIDEO YARATISH ==="
          python generate_video.py
          
          # Tekshirish
          if [ -f output/video.mp4 ]; then
            echo "✅ Video yaratildi!"
            ls -la output/
          else
            echo "❌ Video yaratilmadi!"
            exit 1
          fi
      
      - name: 📤 Videoni media branch'ga joylash
        run: |
          echo "=== MEDIA BRANCH'GA JOYLASH ==="
          
          git config --global user.name "MotivBot"
          git config --global user.email "motivbot@github.com"
          
          # Media branch'iga o'tish
          git fetch origin
          git checkout -b media origin/media 2>/dev/null || git checkout --orphan media
          
          # Videoni nusxalash
          if [ -f output/video.mp4 ]; then
            cp output/video.mp4 video.mp4
            cp output/caption.txt caption.txt 2>/dev/null || echo "No caption"
            
            git add video.mp4 caption.txt 2>/dev/null
            git commit -m "🎬 Video: $(date '+%Y-%m-%d %H:%M')"
            git push origin media --force
            echo "✅ Media branch'ga yuklandi!"
          else
            echo "❌ Video topilmadi!"
            exit 1
          fi
      
      - name: 🔙 Asosiy branch'ga qaytish
        run: |
          git checkout main
          git branch -D media 2>/dev/null || true
      
      - name: 📸 Instagram'ga joylash
        run: |
          echo "=== INSTAGRAMGA JOYLASH ==="
          python upload_and_post.py
      
      - name: ✅ Yakunlash
        if: always()
        run: |
          echo "=== NATIJA ==="
          echo "✅ Workflow yakunlandi!"
